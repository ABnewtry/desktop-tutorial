:root{--bg:#040604;--ph:#b7f542;--dim:#6f9c2b;--faint:#2c3d14;--warn:#f5d442}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{background:var(--bg);color:var(--ph);font-family:"SF Mono","Cascadia Mono",Consolas,ui-monospace,monospace;
  font-size:15px;line-height:1.75;padding:22px clamp(12px,3vw,40px) 120px}
.ar{font-family:Tajawal,sans-serif}
/* CRT layers */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:95;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:96;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,10,0,.5) 100%);
  animation:flick 4s infinite}
@keyframes flick{0%,100%{opacity:1}97%{opacity:1}98%{opacity:.86}99%{opacity:1}}
::selection{background:var(--ph);color:var(--bg)}

.dim{color:var(--dim)}.faint{color:var(--faint)}.warn{color:var(--warn)}
.blink{animation:bl 1s steps(1) infinite}
@keyframes bl{50%{opacity:0}}
#boot div{white-space:pre-wrap;word-break:break-word}
.hidden{display:none}
hr{border:none;border-top:1px dashed var(--faint);margin:14px 0}

.frame{border:1px solid var(--dim);padding:4px 14px 12px;margin-top:10px;position:relative}
.frame .cap{position:absolute;top:-11px;inset-inline-start:12px;background:var(--bg);padding:0 8px;color:var(--ph)}
table{width:100%;border-collapse:collapse;direction:ltr}
th{color:var(--dim);text-align:left;font-weight:400;padding:8px 6px;border-bottom:1px dashed var(--faint);font-size:.8rem;letter-spacing:.1em}
td{padding:9px 6px;border-bottom:1px dashed var(--faint);vertical-align:middle}
tr.p:hover td{background:rgba(183,245,66,.07)}
td .nm{font-weight:700}
td .arr{color:var(--dim);font-size:.78rem}
.swatch{display:inline-block;width:13px;height:13px;border:1px solid var(--dim);vertical-align:-2px;margin-right:7px}
select{background:var(--bg);color:var(--ph);border:1px solid var(--dim);font-family:inherit;padding:3px 6px}
.addb{background:none;border:1px solid var(--ph);color:var(--ph);font-family:inherit;padding:4px 12px;cursor:pointer}
.addb:hover{background:var(--ph);color:var(--bg)}
.teecell svg{width:44px;display:block}

#cartFrame{margin-top:26px}
.cline{display:flex;justify-content:space-between;gap:10px;direction:ltr;padding:4px 0;border-bottom:1px dotted var(--faint)}
.cline button{background:none;border:none;color:var(--warn);cursor:pointer;font-family:inherit}
.tot{display:flex;justify-content:space-between;direction:ltr;padding-top:10px;font-weight:700}
#wa{margin-top:14px;width:100%;background:var(--ph);color:var(--bg);border:none;font-family:inherit;
  font-weight:700;font-size:1rem;padding:13px;cursor:pointer;letter-spacing:.06em}
#wa:hover{filter:brightness(1.12)}
.note{color:var(--dim);font-size:.75rem;margin-top:8px;text-align:center}
.k{color:var(--warn)}
footer{margin-top:34px;color:var(--faint);direction:ltr;font-size:.75rem;letter-spacing:.12em}
@media(max-width:720px){
  th:nth-child(1),td:nth-child(1){display:none}
  body{font-size:13.5px}
}
</style>
</head>
<body>

<div id="boot" dir="ltr"></div>

<div id="shop" class="hidden">
  <div dir="ltr">
    <span class="dim">ab@store</span>:<span class="warn">~/drop-001</span>$ list --all --currency=SAR<span class="blink">▊</span>
  </div>

  <div class="frame">
    <span class="cap">INVENTORY [6/6]</span>
    <table id="tbl">
      <thead><tr><th>PREVIEW</th><th>ID</th><th>ITEM</th><th>SIZE</th><th>PRICE</th><th>ACTION</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="frame" id="cartFrame">
    <span class="cap">CART_STACK</span>
    <div id="items"><div class="dim" style="direction:ltr">// empty — push items with [ADD+]</div></div>
    <div class="tot"><span>TOTAL</span><span id="total">0 SAR</span></div>
    <button id="wa">CHECKOUT → WHATSAPP</button>
    <div class="note ar">يفتح واتساب بطلبك مكتوباً — الدفع عند التأكيد</div>
  </div>

  <footer>AB_SHELL v1.0 — WEAR YOUR ATTITUDE — © 2026 — uptime: <span id="up">0s</span></footer>
</div>

<script>
const PRODUCTS=[
 {id:"TRV-CRM",en:"TRAVEL AB / cream",ar:"الترحال — كريمي",body:"#e9e1cf",ink:"#3a3630",print:"stamp"},
 {id:"TRV-BLK",en:"TRAVEL AB / black",ar:"الترحال — أسود",body:"#17171b",ink:"#d8d2c4",print:"stamp"},
 {id:"ANM-CRM",en:"ANIME AB / cream",ar:"الأسطورة — كريمي",body:"#e9e1cf",ink:"#3a3630",print:"sun"},
 {id:"ANM-GRN",en:"ANIME AB / green",ar:"الأسطورة — أخضر",body:"#31503c",ink:"#e6efd8",print:"sun"},
 {id:"CPL-HIM",en:"COUPLES / him",ar:"كابلز — هو",body:"#1d2540",ink:"#dfe4f2",print:"star1"},
 {id:"CPL-HER",en:"COUPLES / her",ar:"كابلز — هي",body:"#1d2540",ink:"#dfe4f2",print:"star2"},
];
const SIZES=["S","M","L","XL","XXL"];
function tee(p){
 const pr={
  stamp:`<g stroke="${p.ink}" fill="none" stroke-width="3"><circle cx="100" cy="108" r="27" stroke-dasharray="5 4"/></g><text x="100" y="115" text-anchor="middle" font-weight="900" font-size="17" font-family="sans-serif" fill="${p.ink}">AB</text>`,
  sun:`<circle cx="100" cy="106" r="24" fill="${p.ink}"/><g stroke="${p.body}" stroke-width="4" stroke-linecap="round"><line x1="86" y1="120" x2="118" y2="90"/></g>`,
  star1:`<path d="M100 88 l6 14 14 3 -14 6 -6 14 -6-14 -14-6 14-3z" fill="${p.ink}"/>`,
  star2:`<path d="M100 88 l6 14 14 3 -14 6 -6 14 -6-14 -14-6 14-3z" fill="none" stroke="${p.ink}" stroke-width="2.4"/>`};
 return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M42 34 L76 16 Q100 30 124 16 L158 34 L188 76 L154 94 L150 72 L150 186 Q100 197 50 186 L50 72 L46 94 L12 76 Z" fill="${p.body}" stroke="rgba(183,245,66,.4)" stroke-width="2"/>${pr[p.print]||""}</svg>`;
}

/* ---------- boot sequence ---------- */
const LINES=[
 ["AB_SHELL v1.0 — initializing…",120],
 ["mount /dev/attitude … <span class='dim'>ok</span>",240],
 ["load brand.identity … <span class='dim'>neon/black — ok</span>",240],
 ["fetch inventory.db … <span class='dim'>6 items, 119 SAR each</span>",300],
 ["verify stock … <span class='dim'>limited: 50/design</span>",260],
 ["<span class='warn'>WELCOME. WEAR YOUR ATTITUDE.</span>",200],
];
const boot=document.getElementById('boot');
let li=0;
function typeLine(){
 if(li>=LINES.length){
   setTimeout(()=>{document.getElementById('shop').classList.remove('hidden');
     scrollTo({top:boot.offsetHeight,behavior:'smooth'});},350);
   return;
 }
 const [txt,delay]=LINES[li++];
 const d=document.createElement('div');
 d.innerHTML='<span class="dim">ab@store</span>:<span class="warn">~</span>$ '+txt;
 boot.appendChild(d);
 setTimeout(typeLine,delay);
}
typeLine();

/* ---------- table ---------- */
const tb=document.querySelector('#tbl tbody');
tb.innerHTML=PRODUCTS.map((p,i)=>`
 <tr class="p">
  <td class="teecell">${tee(p)}</td>
  <td class="dim">[${String(i+1).padStart(2,'0')}] ${p.id}</td>
  <td><span class="nm">${p.en}</span><br><span class="arr ar">${p.ar}</span></td>
  <td><select data-p="${p.id}">${SIZES.map(s=>`<option${s==='L'?' selected':''}>${s}</option>`).join('')}</select></td>
  <td>119</td>
  <td><button class="addb" data-p="${p.id}">ADD+</button></td>
 </tr>`).join('');

/* ---------- cart ---------- */
let cart=JSON.parse(localStorage.getItem('abcart_term')||'[]');
const save=()=>localStorage.setItem('abcart_term',JSON.stringify(cart));
function draw(){
 const t=cart.reduce((a,i)=>a+i.q*119,0);
 total.textContent=t+' SAR';
 items.innerHTML=cart.length?cart.map((i,x)=>{
  const p=PRODUCTS.find(p=>p.id===i.id);
  return `<div class="cline"><span>> ${p.en} · ${i.s} × ${i.q}</span>
    <span>${i.q*119} SAR <button onclick="rm(${x})">[rm]</button></span></div>`;
 }).join(''):'<div class="dim" style="direction:ltr">// empty — push items with [ADD+]</div>';
}
window.rm=(x)=>{cart.splice(x,1);save();draw();};
tb.querySelectorAll('.addb').forEach(b=>b.onclick=()=>{
 const id=b.dataset.p, s=tb.querySelector(`select[data-p="${id}"]`).value, k=id+'/'+s;
 const f=cart.find(i=>i.k===k); if(f)f.q++;else cart.push({k,id,s,q:1});
 save();draw();
 b.textContent='OK✓';setTimeout(()=>b.textContent='ADD+',700);
});
wa.onclick=()=>{
 if(!cart.length)return;
 const t=cart.reduce((a,i)=>a+i.q*119,0);
 let msg="طلب جديد من AB_SHELL 💻\n———————————\n";
 cart.forEach(i=>{const p=PRODUCTS.find(p=>p.id===i.id);
  msg+=`• ${p.en} (${p.ar}) — مقاس ${i.s} × ${i.q} = ${i.q*119} ر.س\n`;});
 msg+=`———————————\nالإجمالي: ${t} ر.س`;
 open('https://wa.me/966546515366?text='+encodeURIComponent(msg),'_blank');
};
draw();

/* uptime */
let s0=Date.now();
setInterval(()=>{up.textContent=Math.floor((Date.now()-s0)/1000)+'s';},1000);
</script>
</body>
</html>
