name: Deploy AB site to GitHub Pages

on:
  push:
    branches: ["claude/nifty-cannon-3dPdw", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f styles.css ] && cp styles.css _site/ || true
          mkdir -p _site/mockups/assets
          cp mockups/*.html _site/mockups/
          cp -r mockups/assets/* _site/mockups/assets/ 2>/dev/null || true
          mkdir -p _site/assets
          cp -r assets/* _site/assets/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
