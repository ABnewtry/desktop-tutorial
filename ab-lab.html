<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مختبر مؤثرات AB — ٥٠ مؤثراً حياً بأسمائها العلمية</title>
<meta name="description" content="معرض حي: ٥٠ مؤثر ويب تفاعلي مقسمة على ٥ أقسام — المؤشر، السكرول، التايبوغرافي، الحركة، والأجواء — وتحت كل مؤثر اسمه العلمي.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070e; --card:#111120; --border:#ffffff1c; --text:#f4f4fb; --muted:#a9a6c2;
  --v:#7c5cff; --c:#22d3ee; --p:#ff5c8a; --y:#ffd75e; --g:#4cd07d;
  --grad:linear-gradient(120deg,#7c5cff 0%,#22d3ee 50%,#ff5c8a 100%);
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Tajawal','Cairo',system-ui,sans-serif;
  overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
::selection{background:var(--v);color:#fff}

/* ═══ الهيدر والتبويبات ═══ */
#top{position:fixed;top:0;left:0;right:0;z-index:50;padding:calc(10px + var(--sat)) 14px 0;
  background:linear-gradient(180deg,rgba(7,7,14,.96) 60%,rgba(7,7,14,.82));backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border)}
#brand{display:flex;align-items:center;gap:11px;margin-bottom:10px}
#logo{width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;
  font-family:'Cairo';font-weight:900;font-size:16px;background:var(--grad);color:#0a0a12}
#brand h1{font-family:'Cairo';font-weight:900;font-size:18.5px}
#brand p{font-size:11.5px;color:var(--muted)}
#tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:none;min-height:44px;padding:9px 15px;border-radius:12px;font-size:13px;font-weight:800;
  color:var(--muted);border:1.5px solid var(--border);background:rgba(255,255,255,.04);
  display:flex;align-items:center;gap:7px;transition:all .25s}
.tab i{font-style:normal}
.tab.on{color:#0a0a12;background:var(--grad);border-color:transparent}
.tab:active{transform:scale(.95)}

/* ═══ الصفحات ═══ */
.page{display:none;padding:calc(128px + var(--sat)) 14px calc(40px + var(--sab));max-width:1200px;margin:0 auto}
.page.on{display:block}
.pgHead{margin-bottom:22px}
.pgHead h2{font-family:'Cairo';font-weight:900;font-size:24px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.pgHead p{font-size:13.5px;color:var(--muted);margin-top:4px;line-height:1.8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}

/* ═══ بطاقة المؤثر ═══ */
.fx{border:1.5px solid var(--border);border-radius:18px;overflow:hidden;background:var(--card);
  display:flex;flex-direction:column}
.demo{position:relative;aspect-ratio:4/3;overflow:hidden;background:#0b0b16;touch-action:pan-y;
  display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
.meta{padding:12px 14px calc(12px);border-top:1px solid var(--border)}
.meta b{display:block;font-family:'Cairo';font-weight:800;font-size:14.5px}
.meta span{display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;
  color:var(--c);margin-top:3px;direction:ltr;text-align:right}
.meta em{display:block;font-style:normal;font-size:11px;color:var(--muted);margin-top:5px}
.num{position:absolute;top:9px;right:11px;z-index:5;font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:rgba(244,244,251,.4);letter-spacing:.1em}

/* عناصر مشتركة للعروض */
.dTitle{font-family:'Cairo';font-weight:900;font-size:26px;pointer-events:none}
.chip{position:absolute;padding:6px 13px;border-radius:99px;font-size:11.5px;font-weight:800;
  background:rgba(124,92,255,.2);border:1px solid rgba(124,92,255,.6);pointer-events:none;white-space:nowrap}
canvas.dc{position:absolute;inset:0;width:100%;height:100%}
.replayable{cursor:pointer}
</style>
</head>
<body>

<header id="top">
  <div id="brand">
    <span id="logo">AB</span>
    <div><h1>مختبر مؤثرات AB</h1><p>٥٠ مؤثراً حياً — جرّبها بيدك، وتحت كل واحد اسمه العلمي</p></div>
  </div>
  <nav id="tabs" aria-label="أقسام المختبر"></nav>
</header>

<main id="pages"></main>

<script>
'use strict';
/* ════════════════════════════════════════════════════════════
   مختبر مؤثرات AB — 5 أقسام × 10 عروض حية
   على الأجهزة اللمسية: مؤثرات المؤشر تعمل بمؤشر وهمي يتجول آلياً
   ════════════════════════════════════════════════════════════ */
const FINE = matchMedia('(hover:hover) and (pointer:fine)').matches;
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const $ = s => document.querySelector(s);
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.min(b, Math.max(a,v));
const el = (tag, cls, html) => { const d = document.createElement(tag); if (cls) d.className = cls; if (html != null) d.innerHTML = html; return d; };

const SECTIONS = [
  { id:'cursor', icon:'🖱️', t:'المؤشر والفأرة', d:'كل ما يتفاعل مع حركة يدك. على الجوال تعمل تلقائياً بمؤشر وهمي — وعلى الكمبيوتر حرّك فأرتك فوق كل بطاقة.' },
  { id:'scroll', icon:'📜', t:'السكرول والتمرير', d:'مؤثرات يقودها التمرير نفسه — مرّر الصفحة لأعلى وأسفل وراقب كل بطاقة تتفاعل.' },
  { id:'type',   icon:'🔤', t:'التايبوغرافي', d:'الخطوط كعنصر تصميم حي — تُعيد كل بطاقة عرضها تلقائياً، واضغطها لإعادة التشغيل.' },
  { id:'motion', icon:'⚡', t:'الحركة والانتقالات', d:'لغة الحركة: نوابض، ارتدادات، ستائر وجسيمات — اضغط أي بطاقة لإعادة العرض.' },
  { id:'vibe',   icon:'🌫️', t:'الأجواء والخامة', d:'الطبقات التي تصنع الإحساس: حبيبات، ضباب، نجوم وإضاءة — تعمل باستمرار.' },
];

/* التبويبات والصفحات */
const tabsEl = $('#tabs'), pagesEl = $('#pages');
const AR_N = ['١','٢','٣','٤','٥'];
SECTIONS.forEach((s, i) => {
  const tab = el('button', 'tab' + (i === 0 ? ' on' : ''), `<i>${s.icon}</i>${AR_N[i]} ${s.t}`);
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById('pg-' + s.id).classList.add('on');
    scrollTo(0, 0);
  });
  tabsEl.appendChild(tab);
  const page = el('section', 'page' + (i === 0 ? ' on' : ''));
  page.id = 'pg-' + s.id;
  page.innerHTML = `<div class="pgHead"><h2>${s.icon} الصفحة ${AR_N[i]} — ${s.t}</h2><p>${s.d}</p></div><div class="grid" id="grid-${s.id}"></div>`;
  pagesEl.appendChild(page);
});

/* تسجيل عرض: يُنشئ بطاقة ويضيف دالة تحديث للحلقة الرئيسية */
const updaters = [];
let fxCount = 0;
function fx(section, arName, enTerm, hint, setup) {
  const grid = document.getElementById('grid-' + section);
  const card = el('div', 'fx');
  const demo = el('div', 'demo');
  demo.appendChild(el('span', 'num', String(++fxCount).padStart(2, '0')));
  card.appendChild(demo);
  card.appendChild(el('div', 'meta', `<b>${arName}</b><span>${enTerm}</span><em>${hint}</em>`));
  grid.appendChild(card);
  const api = setup(demo) || {};
  if (api.update) updaters.push({ el: demo, update: api.update });
  return demo;
}
/* مؤشر لكل عرض: حقيقي عند التحويم، وإلا وهمي يتجول بمنحنى ليساجو */
function pointer(demo, speed) {
  const st = { x: 0.5, y: 0.5, real: false, seed: Math.random() * 10 };
  demo.addEventListener('pointermove', e => {
    const r = demo.getBoundingClientRect();
    st.x = (e.clientX - r.left) / r.width; st.y = (e.clientY - r.top) / r.height;
    st.real = true; st.last = performance.now();
  });
  demo.addEventListener('pointerleave', () => { st.real = false; });
  st.tick = t => {
    if (st.real && performance.now() - (st.last || 0) < 2600) return;
    st.real = false;
    const k = t / 1000 * (speed || 0.5) + st.seed;
    st.x = 0.5 + Math.sin(k) * 0.34;
    st.y = 0.5 + Math.sin(k * 1.37 + 1) * 0.3;
  };
  return st;
}
/* هل البطاقة ظاهرة؟ */
const inView = r => r.bottom > 0 && r.top < innerHeight;
/* إعادة تشغيل: عند الضغط + كل فترة وهي ظاهرة */
function replayer(demo, run, period) {
  demo.classList.add('replayable');
  let lastRun = 0;
  demo.addEventListener('pointerdown', () => { run(); lastRun = performance.now(); });
  updaters.push({ el: demo, update: (t, r) => {
    if (inView(r) && t - lastRun > (period || 5200)) { run(); lastRun = t; }
  } });
  setTimeout(run, 400);
}

/* ═══════════════ الصفحة ١ — المؤشر والفأرة ═══════════════ */

fx('cursor', 'المؤشر التابع', 'Cursor Follower — Lerp', 'حرّك فوق البطاقة: نقطة فورية وحلقة تلحقها بنعومة', demo => {
  demo.appendChild(el('span', 'dTitle', 'AB'));
  const dot = el('div'); dot.style.cssText = 'position:absolute;width:8px;height:8px;border-radius:50%;background:var(--c);pointer-events:none;top:0;left:0';
  const ring = el('div'); ring.style.cssText = 'position:absolute;width:38px;height:38px;border-radius:50%;border:1.5px solid var(--v);pointer-events:none;top:0;left:0';
  demo.append(dot, ring);
  const p = pointer(demo, .6); let rx = .5, ry = .5;
  return { update: (t, r) => { p.tick(t);
    dot.style.transform = `translate(${p.x * r.width - 4}px,${p.y * r.height - 4}px)`;
    rx = lerp(rx, p.x, .1); ry = lerp(ry, p.y, .1);
    ring.style.transform = `translate(${rx * r.width - 19}px,${ry * r.height - 19}px)`; } };
});

fx('cursor', 'الزر المغناطيسي', 'Magnetic Button', 'الزر ينجذب نحو المؤشر ويرجع بنابض', demo => {
  const b = el('button', '', 'اطلب الآن');
  b.style.cssText = 'padding:14px 30px;border-radius:99px;background:var(--grad);color:#0a0a12;font-weight:900;font-family:Cairo;font-size:15px;pointer-events:none';
  demo.appendChild(b);
  const p = pointer(demo, .55); let x = 0, y = 0;
  return { update: (t, r) => { p.tick(t);
    const dx = (p.x - .5) * r.width, dy = (p.y - .5) * r.height;
    const d = Math.hypot(dx, dy), pull = d < 130;
    x = lerp(x, pull ? dx * .45 : 0, .12); y = lerp(y, pull ? dy * .45 : 0, .12);
    b.style.transform = `translate(${x}px,${y}px)`; } };
});

fx('cursor', 'تنافر الحروف', 'Mouse Repulsion + Spring', 'الحروف تهرب من المؤشر وترجع بمرونة', demo => {
  const w = el('div', 'dTitle'); w.style.cssText = 'display:flex;gap:2px;font-size:34px';
  const chars = [...'STUDIO'].map(c => { const s = el('span', '', c); s.style.cssText = 'display:inline-block'; w.appendChild(s); return { s, x: 0, y: 0 }; });
  demo.appendChild(w);
  const p = pointer(demo, .7);
  return { update: (t, r) => { p.tick(t);
    const mx = p.x * r.width, my = p.y * r.height;
    for (const c of chars) {
      const cr = c.s.getBoundingClientRect();
      const cx = cr.left - r.left + cr.width / 2, cy = cr.top - r.top + cr.height / 2;
      const dx = cx - mx, dy = cy - my, d = Math.hypot(dx, dy);
      const f = d < 90 && d > 0.1 ? (1 - d / 90) * 34 : 0;
      c.x = lerp(c.x, f ? dx / d * f : 0, .14); c.y = lerp(c.y, f ? dy / d * f : 0, .14);
      c.s.style.transform = `translate(${c.x}px,${c.y}px)`;
      c.s.style.color = f > 12 ? 'var(--c)' : '';
    } } };
});

fx('cursor', 'ذيل الجزيئات', 'Particle Trail — Canvas', 'جزيئات مضيئة تولد خلف المؤشر وتموت بتلاشٍ', demo => {
  const cv = el('canvas', 'dc'); demo.appendChild(cv);
  const ctx = cv.getContext('2d'); let parts = [];
  const p = pointer(demo, .8);
  return { update: (t, r) => { p.tick(t);
    if (cv.width !== r.width | 0) { cv.width = r.width; cv.height = r.height; }
    parts.push({ x: p.x * r.width, y: p.y * r.height, vx: (Math.random() - .5) * .8, vy: (Math.random() - .5) * .8, life: 1 });
    if (parts.length > 90) parts.shift();
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.globalCompositeOperation = 'lighter';
    parts = parts.filter(q => q.life > 0);
    for (const q of parts) { q.x += q.vx; q.y += q.vy; q.life -= .025;
      ctx.globalAlpha = q.life * .7; ctx.fillStyle = '#22d3ee';
      ctx.beginPath(); ctx.arc(q.x, q.y, 2.4, 0, 6.28); ctx.fill(); }
    ctx.globalAlpha = 1; } };
});

fx('cursor', 'الكشاف الضوئي', 'Spotlight / Mask Reveal', 'المؤشر مصباح يكشف ما تحته', demo => {
  const hid = el('div', '', 'أعمال<br>مخفية ✨');
  hid.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font-family:Cairo;font-weight:900;font-size:30px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent';
  const cover = el('div');
  cover.style.cssText = 'position:absolute;inset:0;background:#0b0b16;pointer-events:none';
  demo.append(hid, cover);
  const p = pointer(demo, .5);
  return { update: (t, r) => { p.tick(t);
    cover.style.maskImage = cover.style.webkitMaskImage =
      `radial-gradient(circle 70px at ${p.x * 100}% ${p.y * 100}%, transparent 0 60px, black 75px)`; } };
});

fx('cursor', 'بطاقة ثلاثية الأبعاد', '3D Tilt — Perspective', 'البطاقة تميل نحو المؤشر كأنها معلقة بالهواء', demo => {
  demo.style.perspective = '600px';
  const c = el('div', '', '<b style="font-family:Cairo;font-size:19px">AB®</b><span style="font-size:11px;color:var(--muted)">HEAVYWEIGHT TEE</span>');
  c.style.cssText = 'width:56%;height:64%;border-radius:16px;background:linear-gradient(150deg,#1d1d33,#12121f);border:1.5px solid var(--border);display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;pointer-events:none;box-shadow:0 18px 40px rgba(0,0,0,.5)';
  demo.appendChild(c);
  const p = pointer(demo, .45);
  return { update: t => { p.tick(t);
    c.style.transform = `rotateY(${(p.x - .5) * 26}deg) rotateX(${(.5 - p.y) * 22}deg)`; } };
});

fx('cursor', 'ذيل الصور', 'Image Trail', 'بطاقات مصغرة تنبثق على مسار المؤشر وتتلاشى', demo => {
  const p = pointer(demo, .75);
  const COLORS = ['#7c5cff', '#22d3ee', '#ff5c8a', '#ffd75e'];
  let lastSpawn = 0, k = 0;
  return { update: (t, r) => { p.tick(t);
    if (t - lastSpawn > 130) {
      lastSpawn = t;
      const s = el('div', '', 'AB');
      s.style.cssText = `position:absolute;width:44px;height:56px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:Cairo;font-weight:900;font-size:13px;color:#0a0a12;background:${COLORS[k++ % 4]};left:0;top:0;pointer-events:none;transform:translate(${p.x * r.width - 22}px,${p.y * r.height - 28}px) rotate(${(Math.random() - .5) * 24}deg)`;
      demo.appendChild(s);
      s.animate([{ opacity: 1, scale: 1 }, { opacity: 0, scale: .6 }], { duration: 900, easing: 'ease-out' })
        .onfinish = () => s.remove();
    } } };
});

fx('cursor', 'الميلان بالسرعة', 'Velocity Skew', 'العنصر يميل بمقدار سرعة يدك — ليس بمكانها', demo => {
  const b = el('div', 'dTitle', 'سرعة اليد');
  b.style.cssText += ';font-size:28px;padding:16px 26px;border:1.5px solid var(--border);border-radius:14px;background:var(--card)';
  demo.appendChild(b);
  const p = pointer(demo, 1.1); let px = .5, sk = 0;
  return { update: t => { p.tick(t);
    const v = (p.x - px) * 240; px = p.x;
    sk = lerp(sk, clamp(v, -18, 18), .16);
    b.style.transform = `skewX(${-sk}deg)`; } };
});

fx('cursor', 'الوسم التابع', 'Cursor Label / Tooltip Follower', 'وسم يطارد المؤشر بتأخير — مثل «VIEW» فوق المنتجات', demo => {
  demo.appendChild(el('span', 'dTitle', '🖼️'));
  const tag = el('span', 'chip', 'شاهد العمل ←');
  demo.appendChild(tag);
  const p = pointer(demo, .5); let x = .5, y = .5;
  return { update: (t, r) => { p.tick(t);
    x = lerp(x, p.x, .09); y = lerp(y, p.y, .09);
    tag.style.transform = `translate(${x * r.width - 50}px,${y * r.height + 18}px)`; } };
});

fx('cursor', 'التوهج المحيطي', 'Proximity Glow / Hover Bloom', 'كلما اقترب المؤشر توهّج العنصر أكثر', demo => {
  const b = el('div', 'dTitle', 'اقترب مني');
  b.style.cssText += ';font-size:24px;padding:18px 28px;border-radius:16px;border:1.5px solid var(--v);transition:box-shadow .15s,color .15s';
  demo.appendChild(b);
  const p = pointer(demo, .5);
  return { update: (t, r) => { p.tick(t);
    const dx = (p.x - .5) * r.width, dy = (p.y - .5) * r.height;
    const g = clamp(1 - Math.hypot(dx, dy) / 150, 0, 1);
    b.style.boxShadow = `0 0 ${g * 46}px rgba(124,92,255,${g * .8}), inset 0 0 ${g * 22}px rgba(124,92,255,${g * .35})`;
    b.style.color = g > .55 ? '#c4b5fd' : ''; } };
});

/* ═══════════════ الصفحة ٢ — السكرول والتمرير ═══════════════ */

let scrollVel = 0, lastScrollY = 0;

fx('scroll', 'الباراللاكس الطبقي', 'Parallax Layers', 'ثلاث طبقات تتحرك بسرعات مختلفة مع تمريرك', demo => {
  const mk = (txt, size, color, z) => { const d = el('div', '', txt);
    d.style.cssText = `position:absolute;font-family:Cairo;font-weight:900;font-size:${size}px;color:${color};z-index:${z};pointer-events:none`; demo.appendChild(d); return d; };
  const l1 = mk('AB', 120, 'rgba(124,92,255,.14)', 1);
  const l2 = mk('معرض الأعمال', 24, 'rgba(244,244,251,.85)', 2);
  const l3 = mk('✦', 26, 'var(--c)', 3); l3.style.top = '18%'; l3.style.right = '16%';
  return { update: (t, r) => {
    const p = (innerHeight / 2 - (r.top + r.height / 2)) / innerHeight;
    l1.style.transform = `translateY(${p * 90}px)`;
    l2.style.transform = `translateY(${p * 34}px)`;
    l3.style.transform = `translateY(${p * 150}px)`; } };
});

fx('scroll', 'شريط تقدم القراءة', 'Scroll Progress Indicator', 'يعبأ بنسبة تقدمك في الصفحة كلها', demo => {
  const wrap = el('div'); wrap.style.cssText = 'width:72%;display:flex;flex-direction:column;gap:12px;align-items:center';
  const num = el('b', '', '٠٪'); num.style.cssText = 'font-family:Cairo;font-size:34px';
  const bar = el('div'); bar.style.cssText = 'width:100%;height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden';
  const fill = el('i'); fill.style.cssText = 'display:block;height:100%;width:0;border-radius:99px;background:var(--grad)';
  bar.appendChild(fill); wrap.append(num, bar); demo.appendChild(wrap);

fx('motion', 'انفجار الجسيمات', 'Confetti / Particle Burst', 'اضغط البطاقة — احتفال كامل من مركز الضغطة', demo => {
  const cv = el('canvas', 'dc'); demo.appendChild(cv);
  const ctx = cv.getContext('2d'); let parts = [];
  const COLORS = ['#7c5cff', '#22d3ee', '#ff5c8a', '#ffd75e', '#f4f4fb'];
  const boom = (x, y) => { for (let i = 0; i < 34; i++) {
    const a = Math.random() * 6.28, sp = Math.random() * 4 + 1.5;
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, g: .16, life: 1, c: COLORS[i % 5], w: Math.random() * 5 + 3, rot: Math.random() * 6.28 }); } };
  demo.addEventListener('pointerdown', e => { const r = demo.getBoundingClientRect(); boom(e.clientX - r.left, e.clientY - r.top); });
  demo.classList.add('replayable');
  let lastAuto = 0;
  return { update: (t, r) => {
    if (cv.width !== r.width | 0) { cv.width = r.width; cv.height = r.height; }
    if (inView(r) && t - lastAuto > 3600) { lastAuto = t; boom(cv.width / 2, cv.height / 2); }
    ctx.clearRect(0, 0, cv.width, cv.height);
    parts = parts.filter(p => p.life > 0);
    for (const p of parts) { p.x += p.vx; p.y += p.vy; p.vy += p.g; p.life -= .016; p.rot += .1;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.c; ctx.fillRect(-p.w / 2, -p.w / 2, p.w, p.w * .65); ctx.restore(); }
    ctx.globalAlpha = 1; } };
});

fx('motion', 'تموج الضغطة', 'Ripple Effect', 'موجة دائرية تنتشر من نقطة اللمس — أثر ماتيريال الشهير', demo => {
  const b = el('button', '', 'اضغطني'); demo.appendChild(b);
  b.style.cssText = 'padding:16px 38px;border-radius:14px;background:var(--card);border:1.5px solid var(--v);font-family:Cairo;font-weight:800;font-size:16px;color:var(--text);position:relative;overflow:hidden';
  const rip = (x, y) => {
    const r = el('span'); const br = b.getBoundingClientRect();
    r.style.cssText = `position:absolute;left:${x - br.left}px;top:${y - br.top}px;width:8px;height:8px;margin:-4px;border-radius:50%;background:rgba(124,92,255,.5);pointer-events:none`;
    b.appendChild(r);
    r.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(38)', opacity: 0 }], { duration: 750, easing: 'ease-out' }).onfinish = () => r.remove();
  };
  b.addEventListener('pointerdown', e => rip(e.clientX, e.clientY));
  let lastAuto = 0;
  updaters.push({ el: demo, update: (t, rr) => {
    if (inView(rr) && t - lastAuto > 3800) { lastAuto = t; const br = b.getBoundingClientRect(); rip(br.left + br.width / 2, br.top + br.height / 2); } } });
});

fx('motion', 'عداد الأرقام المنقلبة', 'Number Flip / Odometer', 'الأرقام تتدحرج عمودياً مثل عدادات المطارات', demo => {
  const wrap = el('div'); wrap.style.cssText = 'display:flex;gap:6px;direction:ltr';
  const cols = [1, 1, 9].map(() => {
    const c = el('div'); c.style.cssText = 'width:44px;height:64px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);overflow:hidden;position:relative';
    const roll = el('div'); roll.style.cssText = 'position:absolute;left:0;right:0;top:0;transition:transform 1s cubic-bezier(.16,1,.3,1);text-align:center';
    for (let d = 0; d <= 9; d++) roll.appendChild(el('div', '', String(d))).style.cssText = 'height:64px;line-height:64px;font-family:Cairo;font-weight:900;font-size:28px';
    c.appendChild(roll); wrap.appendChild(c); return roll;
  });
  demo.appendChild(wrap);
  let on = false;
  replayer(demo, () => {
    on = !on;
    const target = on ? [1, 1, 9] : [0, 0, 0];
    cols.forEach((roll, i) => roll.style.transform = `translateY(${-target[i] * 64}px)`);
  }, 3200);
});

fx('vibe', 'حقل النجوم', 'Starfield / Ambient Particles', 'نجوم تتلألأ وتنجرف ببطء — عمق كوني', demo => {
  const cv = el('canvas', 'dc'); demo.appendChild(cv);
  const ctx = cv.getContext('2d');
  let stars = [];
  return { update: (t, r) => {
    if (cv.width !== r.width | 0) { cv.width = r.width; cv.height = r.height;
      stars = Array.from({ length: 70 }, () => ({ x: Math.random() * cv.width, y: Math.random() * cv.height, r: Math.random() * 1.6 + .4, s: Math.random() * 8 + 3, p: Math.random() * 6.28 })); }
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (const s of stars) {
      ctx.globalAlpha = .3 + Math.sin(t / 700 + s.p) * .28;
      ctx.fillStyle = '#c9c6ec';
      ctx.beginPath(); ctx.arc(s.x, (s.y + t / 1000 * s.s) % cv.height, s.r, 0, 6.28); ctx.fill(); }
    ctx.globalAlpha = 1; } };
});

fx('vibe', 'شبكة النقاط النابضة', 'Dot Grid Pulse', 'موجة تعبر شبكة نقاط — إيقاع هندسي حي', demo => {
  const cv = el('canvas', 'dc'); demo.appendChild(cv);
  const ctx = cv.getContext('2d');
  return { update: (t, r) => {
    if (cv.width !== r.width | 0) { cv.width = r.width; cv.height = r.height; }
    ctx.clearRect(0, 0, cv.width, cv.height);
    const GAP = 22;
    for (let x = GAP / 2; x < cv.width; x += GAP) for (let y = GAP / 2; y < cv.height; y += GAP) {
      const d = Math.hypot(x - cv.width / 2, y - cv.height / 2);
      const w = Math.sin(t / 500 - d / 26) * .5 + .5;
      ctx.globalAlpha = .18 + w * .6;
      ctx.fillStyle = w > .82 ? '#22d3ee' : '#8a86c8';
      ctx.beginPath(); ctx.arc(x, y, 1.1 + w * 1.9, 0, 6.28); ctx.fill(); }
    ctx.globalAlpha = 1; } };
});

/* ═══ الحلقة الرئيسية: تحديث العروض الظاهرة فقط ═══ */
addEventListener('scroll', () => {
  scrollVel = lerp(scrollVel, scrollY - lastScrollY, .5);
  lastScrollY = scrollY;
}, { passive: true });
(function master(t) {
  requestAnimationFrame(master);
  if (REDUCED) return;
  scrollVel *= .9;
  for (const u of updaters) {
    const r = u.el.getBoundingClientRect();
    if (r.width === 0) continue;          /* صفحة مخفية */
    if (r.bottom < -80 || r.top > innerHeight + 80) continue; /* خارج الشاشة */
    u.update(t || 0, r);
  }
})(0);
</script>
