:root{--bg:#08080a;--card:#0e0e12;--fg:#f2f0ec;--mut:#7a7a80;--acc:#c6f52e;--stroke:rgba(255,255,255,.09)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{background:var(--bg);color:var(--fg);font-family:Tajawal,sans-serif}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:90;opacity:.35;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.22) 2px 4px)}
h1,h2,h3,.disp{font-family:Cairo,sans-serif;font-weight:900}

/* header */
header{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;
  padding:14px clamp(16px,4vw,44px);background:#08080ae8;backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke)}
.logo{font-family:Cairo;font-weight:900;font-size:1.5rem;font-style:italic;color:var(--fg)}
.logo i{font-style:italic;color:var(--acc)}
#cartBtn{position:relative;background:var(--card);border:1px solid var(--stroke);color:var(--fg);
  font-family:Cairo;font-weight:900;padding:11px 22px;border-radius:4px;cursor:pointer;font-size:.95rem}
#cartBtn b{color:var(--acc)}
#cartBtn .n{position:absolute;top:-9px;inset-inline-start:-9px;background:var(--acc);color:#0a0a00;
  width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:.75rem;font-weight:900}

/* ticker */
.ticker{overflow:hidden;border-bottom:1px solid var(--stroke);background:var(--acc);color:#0c0f00}
.ticker .in{display:flex;gap:0;width:max-content;animation:tick 18s linear infinite;direction:ltr}
.ticker span{font-family:Cairo;font-weight:900;font-size:.85rem;letter-spacing:.22em;padding:9px 26px;white-space:nowrap}
@keyframes tick{to{transform:translateX(-50%)}}

/* hero */
.hero{padding:clamp(44px,8vw,90px) clamp(16px,4vw,44px) 50px;position:relative}
.hero .lbl{color:var(--acc);font-size:.78rem;letter-spacing:.3em;font-weight:500}
.hero h1{font-size:clamp(3.4rem,13vw,10rem);line-height:.95;letter-spacing:-.02em;margin-top:14px}
.hero h1 .en{direction:ltr;display:block}
.hero h1 .out{color:transparent;-webkit-text-stroke:2px var(--fg)}
.hero p{color:var(--mut);margin-top:20px;max-width:40ch}
.count{display:flex;gap:12px;margin-top:30px;direction:ltr;justify-content:flex-end}
.count div{background:var(--card);border:1px solid var(--stroke);border-radius:6px;padding:10px 16px;min-width:74px;text-align:center}
.count b{display:block;font-family:Cairo;font-size:1.6rem;color:var(--acc);font-variant-numeric:tabular-nums}
.count span{font-size:.68rem;color:var(--mut);letter-spacing:.18em}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;
  padding:10px clamp(16px,4vw,44px) 70px}
.prod{background:var(--card);border:1px solid var(--stroke);border-radius:10px;overflow:hidden;
  position:relative;transition:.3s cubic-bezier(.22,.61,.36,1)}
.prod:hover{transform:translateY(-6px);border-color:var(--acc);box-shadow:0 24px 50px -20px #c6f52e44}
.prod::before{content:"";position:absolute;top:0;left:-120%;width:80%;height:100%;z-index:2;pointer-events:none;
  background:linear-gradient(100deg,transparent,#c6f52e14,transparent);transition:left .6s}
.prod:hover::before{left:130%}
.ph{padding:26px 26px 10px;display:grid;place-items:center;background:
  radial-gradient(circle at 50% 30%,#1a1a20 0%,#0e0e12 70%)}
.ph svg{width:82%;max-width:250px;filter:drop-shadow(0 18px 30px #000a)}
.tag{position:absolute;top:14px;inset-inline-start:14px;background:var(--acc);color:#0c0f00;
  font-family:Cairo;font-weight:900;font-size:.7rem;letter-spacing:.14em;padding:5px 12px;border-radius:3px}
.inf{padding:16px 20px 20px}
.inf .en{font-family:Cairo;font-weight:900;font-size:1.3rem;direction:ltr;text-align:end}
.inf .ar{color:var(--mut);font-size:.88rem;margin-top:2px}
.buyrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px}
.pr{font-family:Cairo;font-weight:900;color:var(--acc);font-size:1.15rem;white-space:nowrap}
.sizes{display:flex;gap:6px}
.sz{width:34px;height:34px;border:1px solid var(--stroke);background:transparent;color:var(--mut);
  border-radius:4px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:Cairo}
.sz.on{background:var(--fg);color:#0a0a0c;border-color:var(--fg)}
.add{width:100%;margin-top:14px;background:var(--acc);color:#0c0f00;border:none;font-family:Cairo;
  font-weight:900;font-size:.98rem;padding:13px;border-radius:5px;cursor:pointer;transition:.2s}
.add:hover{filter:brightness(1.1)}
.add:active{transform:scale(.97)}

/* cart drawer */
#ov{position:fixed;inset:0;background:#000a;z-index:70;opacity:0;pointer-events:none;transition:.3s}
#ov.open{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;bottom:0;inset-inline-start:0;width:min(420px,92vw);z-index:80;
  background:#0b0b0e;border-inline-end:1px solid var(--stroke);transform:translateX(110%);
  transition:transform .45s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column}
html[dir="rtl"] #drawer{transform:translateX(110%)}
#drawer.open{transform:translateX(0)!important}
#drawer .hd{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--stroke)}
#drawer .hd h3{font-size:1.2rem}
#drawer .hd button{background:none;border:none;color:var(--mut);font-size:1.4rem;cursor:pointer}
#items{flex:1;overflow-y:auto;padding:10px 22px}
.it{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--stroke)}
.it svg{width:52px;flex:none}
.it .t{flex:1}
.it .t b{font-family:Cairo;font-size:.95rem;display:block;direction:ltr;text-align:end}
.it .t span{color:var(--mut);font-size:.78rem}
.q{display:flex;align-items:center;gap:8px;direction:ltr}
.q button{width:26px;height:26px;border:1px solid var(--stroke);background:none;color:var(--fg);border-radius:4px;cursor:pointer}
.it .p{font-family:Cairo;color:var(--acc);white-space:nowrap;font-size:.9rem}
.empty{color:var(--mut);text-align:center;padding:50px 10px}
#ft{padding:20px 22px;border-top:1px solid var(--stroke)}
#ft .tot{display:flex;justify-content:space-between;font-family:Cairo;font-weight:900;font-size:1.15rem;margin-bottom:14px}
#ft .tot b{color:var(--acc)}
#wa{width:100%;background:var(--acc);color:#0c0f00;border:none;font-family:Cairo;font-weight:900;
  font-size:1.05rem;padding:16px;border-radius:6px;cursor:pointer}
#ft small{display:block;text-align:center;color:var(--mut);margin-top:10px;font-size:.72rem;letter-spacing:.1em}

footer{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:22px clamp(16px,4vw,44px);
  border-top:1px solid var(--stroke);color:var(--mut);font-size:.75rem;letter-spacing:.14em}
.reveal{opacity:0;transform:translateY(26px);transition:.7s cubic-bezier(.22,.61,.36,1)}
.reveal.in{opacity:1;transform:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,80px);background:var(--acc);color:#0c0f00;
  font-family:Cairo;font-weight:900;padding:13px 30px;border-radius:6px;z-index:95;transition:.4s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>

<header>
  <div class="logo">A<i>B</i> — DROP 001</div>
  <button id="cartBtn">السلة <b id="cartTot">0 ر.س</b><span class="n" id="cartN">0</span></button>
</header>

<div class="ticker"><div class="in" id="tick"></div></div>

<section class="hero">
  <span class="lbl">LIMITED — 50 PIECE / DESIGN</span>
  <h1><span class="en out">WEAR YOUR</span><span class="en">ATTITUDE<span style="color:var(--acc)">.</span></span></h1>
  <p>الدروب الأول من AB — ست قطع أوفرسايز، لكل وحدة قصة. إذا خلصت… ما ترجع.</p>
  <div class="count" id="cd">
    <div><b id="ch">00</b><span>HRS</span></div>
    <div><b id="cm">00</b><span>MIN</span></div>
    <div><b id="cs">00</b><span>SEC</span></div>
  </div>
</section>

<main class="grid" id="grid"></main>

<div id="ov"></div>
<aside id="drawer">
  <div class="hd"><h3>سلتك 🛒</h3><button id="closeD">✕</button></div>
  <div id="items"></div>
  <div id="ft">
    <div class="tot"><span>الإجمالي</span><b id="total">0 ر.س</b></div>
    <button id="wa">أكمل الطلب عبر واتساب</button>
    <small>يفتح محادثة واتساب بطلبك جاهزاً — الدفع عند التأكيد</small>
  </div>
</aside>

<div class="toast" id="toast">أُضيفت للسلة ✓</div>

<footer>
  <span>AB © 2026 — DROP 001</span>
  <span style="letter-spacing:.3em">WEAR YOUR ATTITUDE</span>
</footer>

<script>
/* ---------- data ---------- */
const PRODUCTS=[
 {id:"TRV-CRM",en:"TRAVEL AB",ar:"الترحال — كريمي",body:"#e9e1cf",ink:"#3a3630",print:"stamp",price:119},
 {id:"TRV-BLK",en:"TRAVEL AB",ar:"الترحال — أسود",body:"#17171b",ink:"#d8d2c4",print:"stamp",price:119},
 {id:"ANM-CRM",en:"ANIME AB",ar:"الأسطورة — كريمي",body:"#e9e1cf",ink:"#3a3630",print:"sun",price:119},
 {id:"ANM-GRN",en:"ANIME AB",ar:"الأسطورة — أخضر",body:"#31503c",ink:"#e6efd8",print:"sun",price:119},
 {id:"CPL-HIM",en:"COUPLES — HIM",ar:"كابلز — هو",body:"#1d2540",ink:"#dfe4f2",print:"star1",price:119},
 {id:"CPL-HER",en:"COUPLES — HER",ar:"كابلز — هي",body:"#1d2540",ink:"#dfe4f2",print:"star2",price:119},
];
const SIZES=["S","M","L","XL","XXL"];

/* ---------- tee svg ---------- */
function tee(p){
 const prints={
  stamp:`<g stroke="${p.ink}" fill="none" stroke-width="2.4">
    <circle cx="100" cy="108" r="27" stroke-dasharray="5 4"/>
    <circle cx="100" cy="108" r="20"/></g>
    <text x="100" y="105" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="900" font-size="15" fill="${p.ink}">AB</text>
    <text x="100" y="119" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="900" font-size="6.5" letter-spacing="2" fill="${p.ink}">TRAVEL CO.</text>`,
  sun:`<circle cx="100" cy="106" r="24" fill="${p.ink}" opacity=".92"/>
    <g stroke="${p.body}" stroke-width="3.4" stroke-linecap="round">
      <line x1="86" y1="120" x2="118" y2="90"/><line x1="94" y1="126" x2="122" y2="100"/></g>
    <text x="100" y="146" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="900" font-size="8" letter-spacing="3" fill="${p.ink}">ANIME AB</text>`,
  star1:`<path d="M100 88 l6 14 14 3 -14 6 -6 14 -6-14 -14-6 14-3z" fill="${p.ink}"/>
    <circle cx="128" cy="96" r="2" fill="${p.ink}"/><circle cx="76" cy="122" r="2" fill="${p.ink}"/>
    <line x1="106" y1="105" x2="128" y2="96" stroke="${p.ink}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="100" y="146" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="900" font-size="8" letter-spacing="3" fill="${p.ink}">HIM</text>`,
  star2:`<path d="M100 88 l6 14 14 3 -14 6 -6 14 -6-14 -14-6 14-3z" fill="none" stroke="${p.ink}" stroke-width="2.2"/>
    <circle cx="72" cy="98" r="2" fill="${p.ink}"/><circle cx="126" cy="124" r="2" fill="${p.ink}"/>
    <line x1="94" y1="103" x2="72" y2="98" stroke="${p.ink}" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="100" y="146" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="900" font-size="8" letter-spacing="3" fill="${p.ink}">HER</text>`};
 return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <path d="M42 34 L76 16 Q100 30 124 16 L158 34 L188 76 L154 94 L150 72 L150 186 Q100 197 50 186 L50 72 L46 94 L12 76 Z"
    fill="${p.body}" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
  <path d="M76 16 Q100 40 124 16" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="2"/>
  <line x1="50" y1="80" x2="50" y2="180" stroke="rgba(0,0,0,.12)" stroke-width="2"/>
  <line x1="150" y1="80" x2="150" y2="180" stroke="rgba(0,0,0,.12)" stroke-width="2"/>
  ${prints[p.print]||""}
 </svg>`;
}

/* ---------- ticker ---------- */
const seq='WEAR YOUR ATTITUDE — DROP 001 — 119 SAR — OVERSIZED — LIMITED 50 — ';
document.getElementById('tick').innerHTML=('<span>'+seq+'</span>').repeat(6);

/* ---------- countdown to midnight ---------- */
function cd(){const n=new Date(),m=new Date(n);m.setHours(24,0,0,0);let d=(m-n)/1000;
 const f=(x)=>String(Math.floor(x)).padStart(2,'0');
 ch.textContent=f(d/3600);cm.textContent=f(d%3600/60);cs.textContent=f(d%60);}
setInterval(cd,1000);cd();

/* ---------- render grid ---------- */
const sel={};
const grid=document.getElementById('grid');
grid.innerHTML=PRODUCTS.map((p,i)=>`
 <article class="prod reveal" style="transition-delay:${i*60}ms">
  <span class="tag">${p.id}</span>
  <div class="ph">${tee(p)}</div>
  <div class="inf">
    <div class="en">${p.en}</div><div class="ar">${p.ar}</div>
    <div class="buyrow">
      <div class="sizes">${SIZES.map(s=>`<button class="sz${s==='L'?' on':''}" data-p="${p.id}" data-s="${s}">${s}</button>`).join('')}</div>
      <span class="pr">${p.price} ر.س</span>
    </div>
    <button class="add" data-p="${p.id}">أضِف للسلة +</button>
  </div>
 </article>`).join('');
PRODUCTS.forEach(p=>sel[p.id]='L');
document.querySelectorAll('.sz').forEach(b=>b.onclick=()=>{
 sel[b.dataset.p]=b.dataset.s;
 document.querySelectorAll(`.sz[data-p="${b.dataset.p}"]`).forEach(x=>x.classList.toggle('on',x===b));
});

/* ---------- cart ---------- */
let cart=JSON.parse(localStorage.getItem('abcart_neon')||'[]');
const save=()=>localStorage.setItem('abcart_neon',JSON.stringify(cart));
function addC(id){const s=sel[id];const k=id+'/'+s;
 const f=cart.find(i=>i.k===k);
 if(f)f.q++;else cart.push({k,id,s,q:1});
 save();draw();toast();}
function draw(){
 const n=cart.reduce((a,i)=>a+i.q,0), t=cart.reduce((a,i)=>a+i.q*119,0);
 cartN.textContent=n; cartTot.textContent=t+' ر.س'; total.textContent=t+' ر.س';
 items.innerHTML=cart.length?cart.map((i,x)=>{
  const p=PRODUCTS.find(p=>p.id===i.id);
  return `<div class="it">${tee(p)}
   <div class="t"><b>${p.en}</b><span>${p.ar} · مقاس ${i.s}</span>
     <div class="q"><button onclick="qty(${x},-1)">−</button><span>${i.q}</span><button onclick="qty(${x},1)">+</button></div>
   </div><span class="p">${i.q*119} ر.س</span></div>`;
 }).join(''):'<div class="empty">سلتك فاضية… لسه 😉</div>';
}
window.qty=(x,d)=>{cart[x].q+=d;if(cart[x].q<1)cart.splice(x,1);save();draw();};
document.querySelectorAll('.add').forEach(b=>b.onclick=()=>addC(b.dataset.p));
function toast(){const t=document.getElementById('toast');t.classList.add('show');
 clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),1500);}

/* drawer */
const dr=document.getElementById('drawer'),ov=document.getElementById('ov');
cartBtn.onclick=()=>{dr.classList.add('open');ov.classList.add('open');};
closeD.onclick=ov.onclick=()=>{dr.classList.remove('open');ov.classList.remove('open');};

/* whatsapp checkout */
wa.onclick=()=>{
 if(!cart.length)return;
 const t=cart.reduce((a,i)=>a+i.q*119,0);
 let msg="طلب جديد من AB — DROP 001 🛍️\n———————————\n";
 cart.forEach(i=>{const p=PRODUCTS.find(p=>p.id===i.id);
   msg+=`• ${p.en} (${p.ar}) — مقاس ${i.s} × ${i.q} = ${i.q*119} ر.س\n`;});
 msg+=`———————————\nالإجمالي: ${t} ر.س`;
 open('https://wa.me/966546515366?text='+encodeURIComponent(msg),'_blank');
};

/* reveal */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
draw();
</script>
</body>
</html>
